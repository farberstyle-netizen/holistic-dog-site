<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password | Holistic Therapy Dog Association</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>...</header>

    <div class="login-container">
        <h1 class="form-title">Set a New Password</h1>
        
        <div id="error-box" class="error-box"></div>
        <div id="success-box" class="status-msg success">
            Success! Your password has been changed.
        </div>

        <form id="resetForm">
            <p class="form-intro" id="form-intro">Please enter your new password below. It must be at least 8 characters long.</p>
            
            <fieldset id="fieldset">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="password-confirm">Confirm New Password</label>
                    <input type="password" id="password-confirm" name="password_confirm" required>
                </div>
            </fieldset>
            
            <div id="button-container">
                <button type="submit" class="btn-login" id="submitBtn">Save New Password</button>
            </div>
        </form>
        
        <p class="form-footer-link" id="login-link" style="display: none;">
            <a href="login.html">Return to Login</a>
        </p>
    </div>

    <footer>...</footer>

    <script src="header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.getElementById('resetForm');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('password-confirm');
            
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            const submitButton = document.getElementById('submitBtn');
            
            const fieldSet = document.getElementById('fieldset');
            const formIntro = document.getElementById('form-intro');
            const buttonContainer = document.getElementById('button-container');
            const loginLink = document.getElementById('login-link');

            // Get the reset token from the URL query string
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                formIntro.style.display = 'none';
                fieldSet.style.display = 'none';
                buttonContainer.style.display = 'none';
                errorBox.textContent = 'Error: No reset token found. Please check your email link and try again.';
                errorBox.style.display = 'block';
            }

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Reset errors and success state
                errorBox.style.display = 'none';
                successBox.style.display = 'none';
                passwordInput.style.borderColor = '';
                confirmPasswordInput.style.borderColor = '';

                const pass = passwordInput.value;
                const confirmPass = confirmPasswordInput.value;

                // 1. Client-side checks
                if (pass.length < 8) {
                    errorBox.textContent = 'Error: Password must be at least 8 characters.';
                    errorBox.style.display = 'block';
                    passwordInput.style.borderColor = 'var(--primary-maroon)';
                    return;
                }
                if (pass !== confirmPass) {
                    errorBox.textContent = 'Error: Passwords do not match.';
                    errorBox.style.display = 'block';
                    passwordInput.style.borderColor = 'var(--primary-maroon)';
                    confirmPasswordInput.style.borderColor = 'var(--primary-maroon)';
                    return;
                }

                // 2. Disable button
                submitButton.disabled = true;
                submitButton.textContent = 'Saving...';

                // 3. Send to worker (COMPLETED LOGIC)
                const workerUrl = 'https://api-reset-password.farberstyle.workers.dev';
                
                try {
                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            token: token,
                            new_password: pass
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Success! Hide the form, show the success message
                        fieldSet.style.display = 'none';
                        buttonContainer.style.display = 'none';
                        formIntro.style.display = 'none';
                        successBox.style.display = 'block';
                        loginLink.style.display = 'block';
                        
                    } else {
                        // API reported an error (e.g., token expired, password too simple)
                        throw new Error(data.message || 'An unknown error occurred during reset.');
                    }
                } catch (error) {
                    // Network or unhandled API error
                    errorBox.textContent = `Error: ${error.message}`;
                    errorBox.style.display = 'block';
                } finally {
                    // Re-enable button on error, leave disabled on success
                    if (successBox.style.display !== 'block') {
                        submitButton.disabled = false;
                        submitButton.textContent = 'Save New Password';
                    }
                }
            });
        });
    </script>
</body>
</html>
