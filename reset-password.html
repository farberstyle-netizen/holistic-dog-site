<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | HTDA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Holistic Therapy Dog<br>Association</a>
      <nav><ul id="nav-links"></ul></nav>
      <div class="nav-account" id="nav-account-links"></div>
    </div>
  </header>

  <main class="page-container">
    <h1>Create New Password</h1>
    <p>Enter your new password below.</p>

    <div id="msg-box" class="status-msg" style="display: none;"></div>

    <form id="resetForm" style="max-width: 500px; margin: 2rem auto;">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
      </div>
      <button type="submit" class="cta-button" style="width: 100%;">Reset Password</button>
    </form>
  </main>

  <script src="header.js"></script>
  <script>
    const form = document.getElementById('resetForm');
    const msgBox = document.getElementById('msg-box');
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      msgBox.textContent = 'Invalid reset link. Please request a new one.';
      msgBox.className = 'status-msg error';
      msgBox.style.display = 'block';
      form.style.display = 'none';
    }

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = `status-msg ${type}`;
      msgBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;

      if (password !== confirm) {
        showMsg('Passwords do not match', 'error');
        return;
      }

      try {
        const response = await fetch('https://api-reset-password.farberstyle.workers.dev/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (data.success) {
          showMsg('Password reset successful! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showMsg(data.error || 'Failed to reset password', 'error');
        }
      } catch (error) {
        showMsg('Network error. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
